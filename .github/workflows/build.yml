name: Compile Touch Controls Dylib

# This workflow runs whenever you push a change, or you can trigger it manually
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    # We must use a macOS runner to get access to the iOS SDK and clang
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Compile Objective-C to Dylib
        run: |
          echo "Compiling TouchControls.m for arm64 (iOS)..."
          clang -dynamiclib -arch arm64 \
            -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
            -framework Foundation \
            -framework UIKit \
            TouchControls.m \
            -o TouchControls.dylib
          echo "Compilation finished successfully."

      - name: Upload Dylib Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TouchControls-Dylib
          path: TouchControls.dylib
